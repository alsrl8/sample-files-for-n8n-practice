<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>n8n 오프라인 워크숍</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', -apple-system, sans-serif;
    background: #F8FAF5; color: #2A2A2A; min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    padding: 20px;
  }
  .card {
    background: #fff; border-radius: 20px; padding: 36px 32px;
    max-width: 440px; width: 100%;
    box-shadow: 0 4px 24px rgba(0,0,0,0.08);
  }
  .header {
    text-align: center; margin-bottom: 28px;
  }
  .header h1 {
    font-size: 22px; font-weight: 800; color: #1B5E20;
    margin-bottom: 4px;
  }
  .header p { font-size: 14px; color: #7A8A6A; }
  .links { display: flex; flex-direction: column; gap: 12px; }
  .link {
    display: flex; align-items: center; gap: 14px;
    padding: 16px 18px; border-radius: 14px;
    text-decoration: none; color: #2A2A2A;
    border: 1px solid #E0E8D0;
    transition: background 0.15s, border-color 0.15s;
  }
  .link:hover { background: #F5F7F0; border-color: #88B840; }
  .link-icon {
    width: 44px; height: 44px; border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px; flex-shrink: 0; color: #fff; font-weight: 700;
  }
  .link-icon.green { background: #88B840; }
  .link-icon.teal { background: #087878; }
  .link-icon.blue { background: #6196FF; }
  .link-text strong { display: block; font-size: 15px; font-weight: 700; }
  .link-text span { font-size: 12px; color: #7A8A6A; }
</style>
</head>
<body>

<div class="card">
  <div class="header">
    <h1>n8n 오프라인 워크숍</h1>
    <p>5/22 서초 오프라인 세션</p>
  </div>
  <div class="links">
    <a class="link" href="install/">
      <div class="link-icon green" style="background:#F57C00;">C</div>
      <div class="link-text">
        <strong>Claude Code 설치</strong>
        <span>Windows CMD 복사 붙여넣기 3단계</span>
      </div>
    </a>
    <a class="link" href="warmup/">
      <div class="link-icon green">W</div>
      <div class="link-text">
        <strong>Warm-up 데모 영상</strong>
        <span>5단계 따라하기 영상 — 처음부터 차근차근</span>
      </div>
    </a>
    <a class="link" href="showcase/">
      <div class="link-icon teal">S</div>
      <div class="link-text">
        <strong>14팀 워크플로우 쇼케이스</strong>
        <span>우리 팀 과제 구조 확인 + JSON 다운로드</span>
      </div>
    </a>
    <a class="link" href="https://github.com/alsrl8/sample-files-for-n8n-practice">
      <div class="link-icon blue">G</div>
      <div class="link-text">
        <strong>샘플 데이터 GitHub</strong>
        <span>Mock 엑셀, 텍스트 데이터 다운로드</span>
      </div>
    </a>
  </div>
</div>

</body>
</html>
